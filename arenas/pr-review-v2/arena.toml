id = "pr-review-v2"
# 0.2.0 (tickets 019 + 027): six new tasks across a second real repo
# (pygments 2.19.1) covering the full defect taxonomy with a second clean
# trap and a three-task holdout; existing key spans widened to the enclosing
# function (calibration finding: a correct defect identification scored 0
# for citing a line a few rows outside a tight span); holdout exposure is
# tracked in holdout-ledger.md. Cross-version averaging with 0.1.0 records
# is invalid; baselines re-run before new comparisons.
# 0.1.0: first real-repo arena (rich v14.0.0); mechanism per backlog 015.
version = "0.2.0"
taskspec = "specs/pr-review/taskspec.toml"
description = """
Ten frozen pull-request fixtures over two real repository snapshots
(Textualize/rich v14.0.0, MIT; pygments 2.19.1, BSD-2): eight seeded defects
covering correctness, security, error-handling, concurrency, resource-leak,
and data-loss — each authored so its wrongness lives outside the diff hunk —
plus two clean "tempting refactor" PRs as false-positive traps. Workspaces
are 1.4–5MB (≈350K–1.3M tokens), beyond the one-shot probe's context.
Harbor task-directory format; candidates never read tests/ or solution/.
"""

[template]
file = "template.md"

# The search loop optimizes against train+validation only. Holdout is scored
# once per final evaluation, behind the runner's --final flag, and every
# exposure is recorded in holdout-ledger.md.
[split]
train = ["py-progress-speed", "py-padding-clean", "py-markup-escape", "py-save-leak"]
validation = ["py-measure-normalize", "py-guess-swallow", "py-formatter-clean"]
holdout = ["py-live-lock", "py-export-clear", "py-plugin-cache"]

# Frozen surfaces for this arena version: fixtures, answer keys, scorer
# constants, template, and splits. Changing any requires a version bump and
# re-running all baselines. Freeze gate status lives in provenance.md.
