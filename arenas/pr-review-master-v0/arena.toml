id = "pr-review-master-v0"
version = "0.2.0"
taskspec = "specs/pr-review-master/taskspec.toml"
description = """
Synthetic review-swarm master synthesis fixtures. Tasks provide large
candidate-visible specialist member artifacts and hidden answer keys for the
master reviewer to consolidate. Candidates never read tests/ or solution/.
"""

[risk]
class = "low"
notes = "Offline synthetic member-artifact fixtures only; no live repos, secrets, network services, or write actions."

[template]
file = "template.md"

[split]
train = ["credential-duplicate", "clean-noise", "dual-defect-conflict"]
validation = ["runtime-crash", "gate-regression"]
holdout = ["missing-security-member"]
