id = "pr-review-master-v0"
version = "0.1.0"
taskspec = "specs/pr-review-master/taskspec.toml"
description = """
Synthetic review-swarm master synthesis fixtures. Tasks provide candidate-
visible specialist member artifacts and hidden answer keys for the master
reviewer to consolidate. Candidates never read tests/ or solution/.
"""

[risk]
class = "low"
notes = "Offline synthetic member-artifact fixtures only; no live repos, secrets, network services, or write actions."

[template]
file = "template.md"

[split]
train = ["credential-duplicate", "clean-noise"]
validation = ["runtime-crash"]
holdout = ["missing-security-member"]
