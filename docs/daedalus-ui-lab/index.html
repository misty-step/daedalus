<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daedalus UI Lab</title>
  <link rel="stylesheet" href="../../../aesthetic/aesthetic.css">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <div class="lab-shell">
    <header class="lab-top">
      <div class="lab-brand" aria-label="Daedalus UI Lab">
        <span class="lab-mark" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
        <span><b>Daedalus UI Lab</b><small>round 1 - misty-step/aesthetic</small></span>
      </div>
      <div class="viewport-controls" aria-label="Viewport controls">
        <button data-size="fit" class="is-active">Fit</button>
        <button data-size="1440x900">1440</button>
        <button data-size="1280x800">1280</button>
        <button data-size="1024x768">1024</button>
        <button data-size="768x1024">Tablet</button>
        <button data-size="390x844">Phone</button>
        <label>W <input id="customW" inputmode="numeric" value="1440"></label>
        <label>H <input id="customH" inputmode="numeric" value="900"></label>
        <button id="applyCustom">Set</button>
      </div>
      <div class="scale-readout" id="scaleReadout">fit</div>
    </header>

    <aside class="registry" aria-label="Prototype registry">
      <div class="registry-head">
        <b>Task workbench base</b>
        <span>round 1 - winner: unselected</span>
      </div>
      <nav id="optionList" class="option-list" aria-label="Prototype options"></nav>
      <div class="registry-notes">
        <b>Review prompt</b>
        <p>Pick the strongest direction, kill weak ones, and name mutations. The base unit is the task contract.</p>
      </div>
    </aside>

    <main class="preview-area">
      <div class="preview-frame" id="previewFrame">
        <iframe id="prototypeFrame" title="Daedalus UI prototype" src="about:blank"></iframe>
      </div>
    </main>
  </div>
  <script src="app.js?v=1"></script>
</body>
</html>
