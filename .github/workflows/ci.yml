name: gate

# Runs the repo's canonical gate (bin/gate) on every push and PR, so the same
# offline check agents run locally is enforced in CI. Keep CI == bin/gate; add
# or change checks in bin/gate, not here.
on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run the canonical gate
        run: ./bin/gate
