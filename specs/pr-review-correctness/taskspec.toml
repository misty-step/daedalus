# Daedalus task specification: PR-review correctness specialist.
# Gate G1 approval required before paid search: approvals/G1-pr-review-suite.md

id = "pr-review-correctness"
goal = "Given a pull request fixture, produce structured findings only for correctness-owned defects: logic invariant breaks, reachable runtime crashes, data loss, concurrency errors, and unhandled failure paths."
domain = "code-review-specialist"
mode = "threshold-then-cheap"

[inputs]
description = "Post-change repository files plus PR.diff, filtered by the correctness lens"
fixtures = "arenas/pr-review-correctness-v0"

[output]
contract = "review-swarm member artifact with lens = correctness and findings in the shared member schema"

[oracle]
type = "deterministic"
description = "Seeded-defect answer keys from the correctness-owned subset of pr-review-v2; reward follows runner/score.py with false-positive penalty"

[risk]
class = "low"
notes = "Offline open-source synthetic PR fixtures only; no live repos, secrets, comments, or write actions."

[budget]
max_cost_per_trial_usd = 0.50
max_wall_per_trial_sec = 600

[trigger]
intent = "Required member in the review-swarm suite after G3; manual sandbox runs until then"

[boundaries]
data = "Synthetic fixtures in arenas/ only. Candidates never read tests/ or solution/."

[checkpoints]
gates = ["G1-spec", "G2-eval-quality", "G3-launch-contract"]

[lens]
id = "correctness"
taxonomy = "docs/review-swarm-taxonomy.md"
owned_categories = ["logic-invariant", "runtime-crash"]
adapted_from = "arenas/pr-review-v2"
adapted_tasks = ["py-progress-speed", "py-measure-normalize", "py-plugin-cache", "py-live-lock", "py-export-clear", "py-padding-clean", "py-formatter-clean"]
authored_tasks = ["py-formatter-missing-crash"]
blocked_on = "G2 specialist eval-quality review and v0.2 quality iteration before sandbox import"

[negative_examples]
bad = [
  "security-only findings with no correctness consequence",
  "style or formatting comments",
  "product-intent disagreements with no broken invariant",
  "speculative crashes without a concrete input path",
]

[search]
models = [
  "deepseek/deepseek-v4-flash",
  "deepseek/deepseek-v4-pro",
  "z-ai/glm-4.7-flash",
  "openai/gpt-5.4-mini",
  "moonshotai/kimi-k2.6",
  "qwen/qwen3.7-plus",
]
thinking_levels = ["off", "low", "medium"]
packet_stances = 3
seed_count = 5
base_packet = "packets/reviewer-v1.md"

[search.tool_policies]
full = ["read", "bash", "edit", "write"]
explore = ["read", "bash"]
