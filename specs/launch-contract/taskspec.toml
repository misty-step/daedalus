# Daedalus task specification: launch-contract review agent.
# Schema: DESIGN.md "Task specification". Gate G1 packet:
# approvals/G1-launch-contract.md

id = "launch-contract-v0"
goal = "Given a proposed agent launch contract or import packet, produce structured findings that identify approval-gate, evidence, permission, observability, and portability defects before a control plane consumes it."
domain = "launch-contract-review"
mode = "threshold-then-cheap"

[inputs]
description = "A small workspace containing launch contracts, import packets, and policy notes"
fixtures = "arenas/launch-contract-v0"

[output]
contract = "findings.json: {findings: [{file, line, category, description}]} with categories: approval-gate, evidence, permissions, observability, portability"

[oracle]
type = "deterministic"
description = "Seeded contract defects; reward = max(0, recall - 0.2 * false_positives) per runner/score.py"

[risk]
class = "low"
notes = "Offline synthetic launch-contract fixtures only; no live control-plane repos, secrets, or write actions."

[budget]
max_cost_per_trial_usd = 0.35
max_wall_per_trial_sec = 420

[trigger]
intent = "Manual launch-contract review before G3/G4/G5 approval"

[boundaries]
data = "Synthetic fixtures in arenas/ only. Candidates never read tests/ or solution/."

[checkpoints]
gates = ["G1-spec", "G2-eval-quality", "G3-launch-contract"]

[negative_examples]
bad = [
  "style or wording preferences",
  "complaining that a correctly sandboxed dry run is not deployable",
  "inventing missing approvals on a packet that explicitly refuses deployment",
  "reporting enterprise-readiness concerns without a concrete file/line contract defect",
]

[search]
models = [
  "deepseek/deepseek-v4-flash",
  "deepseek/deepseek-v4-pro",
  "z-ai/glm-4.7-flash",
  "openai/gpt-5.4-mini",
  "moonshotai/kimi-k2.6",
  "qwen/qwen3.7-plus",
]
# Compact contract fixtures should not need high reasoning spend for the first
# transfer proof; revisit if G2 shows the arena is too hard or too noisy.
thinking_levels = ["off", "low", "medium"]
packet_stances = 3
seed_count = 5
base_packet = "packets/contract-review-v1.md"

[search.tool_policies]
full = ["read", "bash", "edit", "write"]
inspect = ["read", "bash"]
"no-exec" = ["read", "edit", "write"]
