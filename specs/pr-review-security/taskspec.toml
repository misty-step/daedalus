# Threshold task specification: PR-review security specialist.
# Gate G1 approval required before paid search: approvals/G1-pr-review-suite.md

id = "pr-review-security"
goal = "Given a pull request fixture, produce structured findings only for security-owned defects: credential exposure, authorization bypass, injection, unsafe input handling, and secret persistence."
domain = "code-review-specialist"
mode = "threshold-then-cheap"

[inputs]
description = "Post-change repository files plus PR.diff, filtered by the security lens"
fixtures = "arenas/pr-review-security-v0"

[output]
contract = "review-swarm member artifact with lens = security and findings in the shared member schema"

[oracle]
type = "deterministic"
description = "Seeded-defect answer keys from the security-owned subset of pr-review-v2; reward follows runner/score.py with false-positive penalty"

[risk]
class = "low"
notes = "Offline open-source synthetic PR fixtures only; no live repos, secrets, comments, or write actions."

[budget]
max_cost_per_trial_usd = 0.50
max_wall_per_trial_sec = 600

[trigger]
intent = "Required member in the review-swarm suite after G3; manual sandbox runs until then"

[boundaries]
data = "Synthetic fixtures in arenas/ only. Candidates never read tests/ or solution/."

[checkpoints]
gates = ["G1-spec", "G2-eval-quality", "G3-launch-contract"]

[lens]
id = "security"
taxonomy = "docs/review-swarm-taxonomy.md"
owned_categories = ["credential-exposure", "authz-bypass", "injection"]
adapted_from = "arenas/pr-review-v2"
adapted_tasks = ["py-markup-escape", "py-padding-clean"]
authored_tasks = ["py-save-token-leak"]
blocked_on = "G2 specialist eval-quality review and real-member replay before full suite export"

[negative_examples]
bad = [
  "general correctness findings with no security consequence",
  "theoretical attacks without a reachable path",
  "style or dependency-maintenance comments",
  "reporting secrets from tests/ or solution/ instead of candidate-visible inputs",
]

[search]
models = [
  "deepseek/deepseek-v4-flash",
  "deepseek/deepseek-v4-pro",
  "z-ai/glm-4.7-flash",
  "openai/gpt-5.4-mini",
  "moonshotai/kimi-k2.6",
  "qwen/qwen3.7-plus",
]
thinking_levels = ["off", "low", "medium"]
packet_stances = 3
seed_count = 5
base_packet = "packets/reviewer-v1.md"

[search.tool_policies]
full = ["read", "bash", "edit", "write"]
explore = ["read", "bash"]
