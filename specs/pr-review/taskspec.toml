# Threshold task specification: focused PR-review agent.
# Schema: DESIGN.md "Task specification". Gate G1 approval: approvals/G1-pr-review.md

id = "pr-review-v0"
goal = "Given a pull request diff plus repository context, produce structured review findings that identify the real defects introduced by the change."
domain = "code-review"
mode = "threshold-then-cheap" # hit the quality bar, then minimize cost

[inputs]
description = "Post-change repository files plus PR.diff (unified diff)"
# v2 (real-repo snapshot) is the canonical arena: v0/v1 are saturated by
# the one-shot probe and retained only as rig exercises.
fixtures = "arenas/pr-review-v2"

[output]
contract = "findings.json: {findings: [{file, line, category, description}]} with categories from the fixed taxonomy (see arena instruction.md)"

[oracle]
type = "deterministic"
description = "Seeded-defect answer keys; reward = max(0, recall - 0.2 * false_positives) per runner/score.py"

[risk]
class = "low"
notes = "Offline synthetic fixtures only; no live repos, secrets, or write actions."

[budget]
max_cost_per_trial_usd = 0.50
max_wall_per_trial_sec = 600

[trigger]
intent = "GitHub PR webhook (Phase 3); manual runs until then"

[boundaries]
data = "Synthetic fixtures in arenas/ only. Candidates never read tests/ or solution/."

[checkpoints]
gates = ["G1-spec", "G2-eval-quality", "G3-launch-contract"]

[negative_examples]
bad = [
  "style or naming nitpicks",
  "confident prose without file/line evidence",
  "flagging pre-existing code the diff does not touch",
  "inventing findings on a clean change",
]

# The candidate space the seeder samples and the mutator moves within.
# Values must exist in docs/primitives.md (live-verified model pool).
[search]
models = [
  "deepseek/deepseek-v4-flash",
  "deepseek/deepseek-v4-pro",
  "z-ai/glm-4.7-flash",
  "openai/gpt-5.4-mini",
  "moonshotai/kimi-k2.6",
  "z-ai/glm-5.2",
  "qwen/qwen3.7-plus",
]
thinking_levels = ["off", "low", "medium", "high"]
packet_stances = 3
seed_count = 6
base_packet = "packets/reviewer-v1.md"

[search.tool_policies]
full = ["read", "bash", "edit", "write"]
explore = ["read", "bash"]
"no-exec" = ["read", "edit", "write"]
