# Saturation probe (reference, like null/oracle — never a candidate): one
# chat completion, no tools, no agent loop. Its only job is the meta-eval
# question "is this arena too easy?". When the probe approaches the oracle, the
# arena cannot rank agent configurations and the search aborts. Excluded from
# Pareto fronts, recommendations, and parent selection by kind.
#
# Real-repo workspaces can exceed model context when inlined whole. The default
# probe therefore uses a bounded review-context prompt: task intent, PR.diff,
# changed files, and small project anchors. This keeps the probe falsifiable
# without letting context overflow masquerade as "unsaturated".
composition = 1
id = "probe-oneshot"
kind = "oneshot"
model = "deepseek/deepseek-v4-pro"
prompt_packet = "packets/reviewer-v1.md"
temperature = 0.2
max_tokens = 16384
timeout_sec = 300
workspace_mode = "review-context"
workspace_max_bytes = 120000
workspace_file_bytes = 24000
