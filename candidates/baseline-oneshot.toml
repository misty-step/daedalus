# Cheap baseline: a single OpenRouter chat completion, no tools, no agent
# loop. The whole workspace is inlined into one prompt. Uses the same model
# and prompt packet as pi-kimi so comparisons isolate the harness.
composition = 1
id = "baseline-oneshot"
kind = "oneshot"
model = "moonshotai/kimi-k2.6"
prompt_packet = "packets/reviewer-v1.md"
temperature = 0.2
max_tokens = 8192
timeout_sec = 300
